name: flutter_challenge
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  auto_route: ^11.1.0
  flutter:
    sdk: flutter
  flutter_mobx: ^2.3.0
  get_it: ^9.2.1
  mobx: ^2.6.0
  provider: ^6.1.5+1
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.12.2
  mobx_codegen: ^2.7.6
  auto_route_generator: ^10.4.0

flutter:
  uses-material-design: true

  fonts:
  - family: TTNormsPro
    fonts:
      - asset: assets/fonts/TTNormsPro-Regular.ttf
        weight: 500
      - asset: assets/fonts/TTNormsPro-Medium.ttf

  assets:
    - assets/images/
